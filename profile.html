<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile · Chonky Cheesus</title>
    <meta name="theme-color" content="#09090b">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background:
                radial-gradient(ellipse 70% 45% at 50% -5%, rgba(245, 158, 11, 0.12), transparent 50%),
                #09090b;
            color: #fafafa;
        }
        .display-font { font-family: 'Space Grotesk', system-ui, sans-serif; letter-spacing: -0.04em; }
        .scripture { font-family: 'IBM Plex Mono', ui-monospace, monospace; letter-spacing: 0.1em; }
        .btn-craft { transition: transform 0.15s ease, background 0.2s ease; }
        .btn-craft:hover { transform: translateY(-1px); }
    </style>
</head>
<body class="min-h-screen">
    <div class="mx-auto max-w-lg px-6 py-10">
        <div class="mb-8 flex items-center justify-between gap-3">
            <div>
                <div class="scripture text-[10px] uppercase text-amber-500/90">Keeper file</div>
                <h1 class="display-font text-3xl font-bold">Profile</h1>
            </div>
            <a href="newchonky.html" class="rounded-2xl border border-zinc-700 bg-zinc-900 px-4 py-2 text-sm font-semibold text-zinc-300 hover:bg-zinc-800">← Main</a>
        </div>

        <!-- Identity -->
        <section class="mb-6 rounded-3xl border border-zinc-800 bg-zinc-900/80 p-6">
            <div class="flex items-start justify-between gap-3 mb-4">
                <div>
                    <div class="text-[11px] uppercase tracking-wider text-zinc-500">Name</div>
                    <div id="prof-name" class="text-xl font-bold text-amber-200">Degen</div>
                </div>
                <div id="prof-rank" class="rounded-full border border-zinc-600 px-3 py-1 text-[11px] font-semibold uppercase tracking-wider text-zinc-400">Degen</div>
            </div>
            <button type="button" onclick="editName()" class="btn-craft w-full rounded-2xl border border-zinc-600 px-4 py-2.5 text-sm font-semibold text-zinc-200 hover:bg-zinc-800">Edit name</button>
            <p id="prof-claim" class="mt-3 text-xs text-zinc-500">No public title claimed yet.</p>
        </section>

        <!-- Stats -->
        <section class="mb-6 grid grid-cols-2 gap-3">
            <div class="rounded-2xl border border-zinc-800 bg-zinc-900/80 p-4 text-center">
                <div class="text-[10px] uppercase tracking-wider text-zinc-500">Thickness</div>
                <div id="prof-thickness" class="text-2xl font-bold text-amber-400 font-mono">0</div>
            </div>
            <div class="rounded-2xl border border-zinc-800 bg-zinc-900/80 p-4 text-center">
                <div class="text-[10px] uppercase tracking-wider text-zinc-500">Streak</div>
                <div id="prof-streak" class="text-2xl font-bold text-amber-200 font-mono">0</div>
            </div>
            <div class="rounded-2xl border border-zinc-800 bg-zinc-900/80 p-4 text-center">
                <div class="text-[10px] uppercase tracking-wider text-zinc-500">Fragments</div>
                <div id="prof-frags" class="text-2xl font-bold text-zinc-200 font-mono">0/7</div>
            </div>
            <div class="rounded-2xl border border-zinc-800 bg-zinc-900/80 p-4 text-center">
                <div class="text-[10px] uppercase tracking-wider text-zinc-500">Rites done</div>
                <div id="prof-rites" class="text-2xl font-bold text-zinc-200 font-mono">0</div>
            </div>
        </section>

        <!-- Daily rite -->
        <section class="mb-6 rounded-3xl border border-zinc-800 bg-zinc-900/80 p-6">
            <div class="scripture text-[10px] uppercase text-amber-500/90 mb-2">Daily rite</div>
            <div id="rite-title" class="text-lg font-semibold text-amber-200">—</div>
            <p id="rite-desc" class="mt-1 text-sm text-zinc-400"></p>
            <div class="mt-4 mb-1 flex justify-between text-xs text-zinc-500">
                <span id="rite-progress-label">0 / 0</span>
                <span id="rite-status-label">—</span>
            </div>
            <div class="h-2 w-full overflow-hidden rounded-full bg-zinc-800">
                <div id="rite-progress-bar" class="h-full rounded-full bg-gradient-to-r from-amber-700 to-amber-400 transition-all" style="width:0%"></div>
            </div>
            <p id="rite-hint" class="mt-3 text-xs text-zinc-500 italic"></p>
            <a id="rite-cta" href="newchonky.html" class="btn-craft mt-4 flex w-full items-center justify-center rounded-2xl bg-amber-400 px-4 py-2.5 text-sm font-bold text-zinc-950 hover:bg-amber-300">Do it on the main page →</a>
        </section>

        <section class="rounded-3xl border border-zinc-800 bg-zinc-900/50 p-5 text-center">
            <p class="text-xs text-zinc-500 mb-3">Flex & public board live on the main sanctum.</p>
            <a href="newchonky.html#public-wall" class="text-sm font-semibold text-amber-300 hover:text-amber-200">Open Living Wall →</a>
        </section>
    </div>

    <script src="keeper.js"></script>
    <script>
        function editName() {
            const K = ChonkyKeeper;
            const cur = K.getUsername() || '';
            const next = prompt('Enter your degen name:', cur);
            if (next === null) return;
            const res = K.setUsername(next);
            if (!res.ok) {
                alert('That name belongs to the myth. Pick another.');
                return;
            }
            render();
        }

        function render() {
            const K = ChonkyKeeper;
            K.loadRiteState();
            const rank = K.deriveRank();
            const name = K.getUsername() || 'Degen';
            const sum = K.riteSummary();
            const claim = K.getLocalClaim();

            document.getElementById('prof-name').textContent = name;
            const rankEl = document.getElementById('prof-rank');
            rankEl.textContent = rank.label;
            const styles = {
                degen: 'border-zinc-600 text-zinc-400',
                initiate: 'border-amber-700/50 text-amber-400/90',
                believer: 'border-amber-500/50 text-amber-300',
                disciple: 'border-amber-400 text-amber-200 bg-amber-500/10',
                saint: 'border-yellow-300 text-yellow-100 bg-amber-400/20',
            };
            rankEl.className = 'rounded-full border px-3 py-1 text-[11px] font-semibold uppercase tracking-wider ' + (styles[rank.id] || styles.degen);

            document.getElementById('prof-thickness').textContent = K.getThickness();
            document.getElementById('prof-streak').textContent = String(sum.state.streak || 0);
            document.getElementById('prof-frags').textContent = `${K.discoveredCount()}/7`;
            document.getElementById('prof-rites').textContent = String(sum.state.totalRites || 0);

            const claimEl = document.getElementById('prof-claim');
            if (claim && claim.name) {
                claimEl.innerHTML = `Public as <span class="text-amber-300 font-medium">${escapeHtml(claim.name)}</span> · <span class="uppercase text-amber-400/80">${escapeHtml(claim.rank || '')}</span>`;
            } else if (K.isSanctumComplete()) {
                claimEl.textContent = 'Disciple+ — claim your title on the main Saints board.';
            } else {
                claimEl.textContent = 'No public title claimed yet.';
            }

            document.getElementById('rite-title').textContent = sum.type.title;
            document.getElementById('rite-desc').textContent = sum.type.desc;
            document.getElementById('rite-progress-label').textContent = `${sum.progress} / ${sum.type.target}`;
            document.getElementById('rite-progress-bar').style.width = `${sum.pct}%`;
            document.getElementById('rite-status-label').textContent = sum.done ? 'Complete ✦' : 'In progress';
            document.getElementById('rite-hint').textContent = sum.done
                ? `Streak ${sum.state.streak}. Return tomorrow.`
                : sum.type.hint;

            const cta = document.getElementById('rite-cta');
            if (sum.done) {
                cta.textContent = 'Back to the cult →';
                cta.href = 'newchonky.html';
                cta.className = 'btn-craft mt-4 flex w-full items-center justify-center rounded-2xl border border-zinc-600 px-4 py-2.5 text-sm font-semibold text-zinc-300 hover:bg-zinc-800';
            } else {
                cta.textContent = 'Do it on the main page →';
                cta.href = 'newchonky.html';
                cta.className = 'btn-craft mt-4 flex w-full items-center justify-center rounded-2xl bg-amber-400 px-4 py-2.5 text-sm font-bold text-zinc-950 hover:bg-amber-300';
            }
        }

        function escapeHtml(str) {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        window.onload = render;
    </script>
</body>
</html>
