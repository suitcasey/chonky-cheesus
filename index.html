    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background:
                radial-gradient(ellipse 90% 55% at 50% -10%, rgba(245, 158, 11, 0.18), transparent 55%),
                #09090b;
            color: #fafafa;
            min-height: 100dvh;
        }
        .logo-font {
            font-family: 'Space Grotesk', system-ui, sans-serif;
            font-weight: 700;
            letter-spacing: -0.06em;
        }
        .display-font {
            font-family: 'Space Grotesk', system-ui, sans-serif;
            letter-spacing: -0.05em;
        }
        .scripture {
            font-family: 'IBM Plex Mono', ui-monospace, monospace;
            letter-spacing: 0.14em;
        }
        .witness-cheese {
            width: min(72vw, 280px);
            height: min(72vw, 280px);
            border-radius: 50%;
            border: 12px solid #b45309;
            background: linear-gradient(145deg, #fde047, #facc15 45%, #d97706);
            box-shadow:
                0 0 60px rgba(245, 158, 11, 0.35),
                inset 0 0 40px rgba(251, 191, 36, 0.25);
            animation: breath 7s ease-in-out infinite;
        }
        body.world-sacred .witness-cheese {
            box-shadow: 0 0 90px rgba(251, 191, 36, 0.55), inset 0 0 50px rgba(254, 243, 199, 0.3);
            border-color: #fcd34d;
        }
        body.world-thin .witness-cheese,
        body.world-critical .witness-cheese {
            filter: grayscale(0.4) saturate(0.7);
            box-shadow: 0 0 40px rgba(113, 113, 122, 0.25);
            border-color: #71717a;
        }
        body.world-critical .witness-cheese {
            filter: grayscale(0.6) saturate(0.5);
            opacity: 0.9;
        }
        @keyframes breath {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .btn-enter {
            transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
        }
        .btn-enter:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(245, 158, 11, 0.35); }
        .btn-enter:active { transform: translateY(0) scale(0.98); }
        @media (prefers-reduced-motion: reduce) {
            .witness-cheese { animation: none; }
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- Navbar -->
    <header class="flex items-center justify-between gap-3 px-5 py-4 sm:px-8 max-w-3xl w-full mx-auto">
        <div class="flex items-center gap-2.5 min-w-0">
            <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-gradient-to-br from-yellow-400 to-amber-500">
                <i class="fa-solid fa-cheese text-lg text-zinc-950"></i>
            </div>
            <div class="min-w-0">
                <div class="logo-font text-xl leading-none tracking-tighter">CHONKY</div>
                <div class="scripture text-[9px] text-amber-400">CHEESUS</div>
            </div>
        </div>
        <div class="flex items-center gap-2 sm:gap-3 shrink-0">
            <a href="https://x.com/CHONKYCHEESUS" target="_blank" rel="noopener noreferrer"
               class="flex h-10 w-10 items-center justify-center rounded-xl border border-zinc-700 bg-zinc-900 text-zinc-300 hover:border-amber-500/40 hover:text-amber-200 transition-colors"
               aria-label="Chonky Cheesus on X">
                <i class="fa-brands fa-x-twitter text-lg"></i>
            </a>
            <a href="newchonky.html" class="btn-enter rounded-2xl border border-amber-400/40 bg-amber-400/10 px-3 py-2 sm:px-4 text-xs sm:text-sm font-semibold text-amber-200 hover:bg-amber-400/20 whitespace-nowrap">
                Enter the Sanctum
            </a>
        </div>
    </header>

    <!-- Witness stage -->
    <main class="flex flex-1 flex-col items-center justify-center px-5 pb-12 pt-4 text-center max-w-lg mx-auto w-full">

        <!-- Shared weather (the differentiator) -->
        <div id="world-strip" class="mb-8 w-full rounded-2xl border border-zinc-800/90 bg-zinc-900/50 px-4 py-3">
            <div class="scripture text-[9px] uppercase text-amber-500/80 mb-1">World · shared</div>
            <div id="world-label" class="text-sm text-zinc-200 leading-snug">Listening…</div>
            <div id="world-threat" class="mt-1 text-xs text-zinc-500 leading-snug"></div>
            <div class="mt-3 flex items-center gap-3">
                <div class="h-1 flex-1 overflow-hidden rounded-full bg-zinc-800">
                    <div id="world-bar" class="h-full rounded-full bg-gradient-to-r from-zinc-500 to-amber-400 transition-all duration-700" style="width:40%"></div>
                </div>
                <div id="world-thickness" class="font-mono text-sm font-bold text-amber-300 tabular-nums">—</div>
            </div>
        </div>

        <!-- Cheese (visual only) -->
        <div class="witness-cheese relative mb-8 flex items-center justify-center" aria-hidden="true">
            <div class="text-center pointer-events-none">
                <i class="fa-solid fa-cheese text-6xl text-amber-800/90 sm:text-7xl"></i>
                <div class="mt-2 text-3xl font-black tracking-tighter text-amber-900/80">CHONK</div>
            </div>
        </div>

        <p class="scripture text-[10px] uppercase text-amber-500/90 mb-3">$CHONK</p>
        <h1 class="display-font text-5xl font-bold leading-none sm:text-6xl mb-4">
            CHONKY<br><span class="text-amber-400">CHEESUS</span>
        </h1>
        <p class="text-zinc-400 text-base sm:text-lg max-w-xs mx-auto mb-2">
            Belief has mass.
        </p>
        <p class="text-zinc-500 text-sm max-w-xs mx-auto italic mb-10">
            Never meant to make sense.<br>Meant to make you stay.
        </p>

        <a href="newchonky.html"
           class="btn-enter inline-flex w-full max-w-xs items-center justify-center rounded-3xl bg-amber-400 px-8 py-4 text-base font-bold text-zinc-950 shadow-lg shadow-amber-500/20 hover:bg-amber-300">
            Enter the Sanctum →
        </a>

        <p class="mt-6 text-[11px] text-zinc-600 max-w-[16rem] mx-auto leading-relaxed">
            Witness the weather. Enter only if you want the myth.
        </p>

        <a href="https://x.com/CHONKYCHEESUS" target="_blank" rel="noopener noreferrer"
           class="mt-10 inline-flex items-center gap-2 text-xs text-zinc-500 hover:text-amber-300 transition-colors">
            <i class="fa-brands fa-x-twitter"></i>
            @CHONKYCHEESUS
        </a>
    </main>

    <script>
        async function loadWorld() {
            try {
                const res = await fetch('/api/world', { cache: 'no-store' });
                if (!res.ok) throw new Error('offline');
                const data = await res.json();
                const w = data.world;
                if (!w) return;
                applyWorld(w);
            } catch {
                document.getElementById('world-label').textContent = 'The cult sleeps. Enter anyway.';
                document.getElementById('world-threat').textContent = 'Weather updates when the host is awake.';
            }
        }

        function applyWorld(w) {
            const label = document.getElementById('world-label');
            const threat = document.getElementById('world-threat');
            const thick = document.getElementById('world-thickness');
            const bar = document.getElementById('world-bar');
            if (label) label.textContent = w.label || '';
            if (threat) threat.textContent = w.threat || '';
            if (thick) thick.textContent = typeof w.thickness === 'number' ? Math.round(w.thickness) : '—';
            if (bar) {
                const max = w.max || 100;
                const pct = Math.max(0, Math.min(100, (w.thickness / max) * 100));
                bar.style.width = pct + '%';
                const tier = w.tier || 'thick';
                bar.className = 'h-full rounded-full transition-all duration-700 bg-gradient-to-r ' + (
                    tier === 'sacred' ? 'from-amber-500 to-yellow-200' :
                    tier === 'thick' ? 'from-amber-700 to-amber-400' :
                    tier === 'waning' ? 'from-zinc-500 to-amber-600' :
                    tier === 'thin' ? 'from-zinc-600 to-zinc-400' :
                    'from-zinc-700 to-zinc-500'
                );
            }
            document.body.classList.remove('world-sacred', 'world-thick', 'world-waning', 'world-thin', 'world-critical');
            if (w.tier) document.body.classList.add('world-' + w.tier);
        }

        loadWorld();
        // Gentle poll so witnesses see weather shift if they linger
        setInterval(loadWorld, 45000);
    </script>
</body>
</html>
